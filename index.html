  label { display:flex; gap:7px; align-items:center; justify-content:center; color:#8fa1ad;

// Each payload is `openssl enc -aes-256-cbc -pbkdf2 -iter ITER -md sha256 -salt` output:
// "Salted__" + 8-byte salt + ciphertext. PBKDF2-SHA256 derives 48 bytes = key(32) + IV(16).
// There is one payload per password (owner + guests); we try the typed password against each.
async function decryptOne(payload, pass) {
  const raw = Uint8Array.from(atob(payload), c => c.charCodeAt(0));
  const salt = raw.slice(8, 16), data = raw.slice(16);
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pass), "PBKDF2", false, ["deriveBits"]);
  const bits = new Uint8Array(await crypto.subtle.deriveBits(

  const key = await crypto.subtle.importKey("raw", bits.slice(0, 32), { name: "AES-CBC" }, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({ name: "AES-CBC", iv: bits.slice(32, 48) }, key, data);

  if (!html.startsWith("<!DOCTYPE")) throw new Error("bad password");

}
