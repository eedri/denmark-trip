<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Denmark & Sweden Campervan Trip — Jul 2026</title>
<style>
  :root {
    --bg: #0f1418;
    --card: #1a2128;
    --accent: #5fb4e5;
    --accent2: #f4b860;
    --text: #e8edf1;
    --muted: #8fa1ad;
    --border: #2a333b;
    --green: #6fcf97;
  }
  :root[data-theme="light"] {
    --bg: #f4f6f8;
    --card: #ffffff;
    --accent: #1565a0;
    --accent2: #9a6516;
    --text: #1a2128;
    --muted: #5a6b78;
    --border: #d8e0e6;
    --green: #2e9e63;
  }
  :root[data-theme="light"] .booking-box { background: #eaf3fb; border-color: #bcdcf2; }
  :root[data-theme="light"] .note { background: #fbf3e2; border-left-color: #d8a23e; }
  :root[data-theme="light"] .drive { background: #e8f1fb; border-color: #bcdcf2; color: #155f96; }
  :root[data-theme="light"] .pill.maps { background: #e3f0fb; border-color: #bcdcf2; color: #155f96; }
  :root[data-theme="light"] .pill.waze { background: #e3f5ea; border-color: #bfe6cd; color: #1f7a4d; }
  :root[data-theme="light"] .pill.park { background: #fbf0d8; border-color: #ecd9a6; color: #7a5d14; }
  :root[data-theme="light"] .expense-box { background: #eef7f0; border-color: #c9e6d3; }
  :root[data-theme="light"] .chip.active { color: #fff; }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding-bottom: 40px;
  }

  /* ---- App bar ---- */
  .appbar {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .appbar .barbtn {
    flex: 0 0 auto;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    height: 38px;
    padding: 0 12px;
    font-size: 0.9rem;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .appbar .barbtn.round { width: 38px; padding: 0; justify-content: center; border-radius: 50%; font-size: 1.1rem; }
  .appbar .bartitle { flex: 1; min-width: 0; font-weight: 700; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  main { padding: 14px 12px; max-width: 860px; margin: 0 auto; }

  /* ---- Home ---- */
  .hero { margin-bottom: 14px; }
  .hero h1 { margin: 0 0 4px; font-size: 1.35rem; }
  .hero p { margin: 0; color: var(--muted); font-size: 0.85rem; line-height: 1.4; }
  .summary {
    display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0 4px;
  }
  .stat {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 8px 12px; font-size: 0.8rem; color: var(--muted); flex: 1; min-width: 120px;
  }
  .stat b { display: block; color: var(--text); font-size: 1.05rem; margin-top: 2px; }

  .chips { display: flex; gap: 8px; overflow-x: auto; padding: 6px 0 12px; -webkit-overflow-scrolling: touch; }
  .chip {
    flex: 0 0 auto; background: var(--card); border: 1px solid var(--border); color: var(--muted);
    border-radius: 20px; padding: 7px 14px; font-size: 0.82rem; cursor: pointer; white-space: nowrap;
  }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #08222f; font-weight: 700; }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  @media (min-width: 560px) { .grid { grid-template-columns: repeat(3, 1fr); } }
  @media (min-width: 800px) { .grid { grid-template-columns: repeat(4, 1fr); } }

  .daycard {
    text-align: left;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px;
    cursor: pointer;
    color: var(--text);
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: transform .08s, border-color .15s;
  }
  .daycard:active { transform: scale(0.98); }
  .daycard:hover { border-color: var(--accent); }
  .daycard-icon {
    width: 54px; height: 54px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem; margin-bottom: 4px;
  }
  .daycard-meta { font-size: 0.72rem; color: var(--muted); font-weight: 700; letter-spacing: .03em; }
  .daycard-date { font-size: 0.78rem; color: var(--accent2); font-weight: 600; }
  .daycard-title { font-size: 0.92rem; font-weight: 600; line-height: 1.25; }
  .daycard-drive { font-size: 0.74rem; color: var(--muted); margin-top: auto; padding-top: 4px; }

  /* ---- Pre-flight checklist ---- */
  .checklist-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    margin: 12px 0 4px; overflow: hidden;
  }
  .checklist-head {
    display: flex; align-items: center; gap: 10px; width: 100%;
    background: none; border: none; color: var(--text); cursor: pointer;
    padding: 14px; text-align: left; font: inherit;
  }
  .checklist-head .cl-emoji { font-size: 1.5rem; }
  .checklist-head .cl-title { font-size: 1rem; font-weight: 700; flex: 1; }
  .checklist-head .cl-count { font-size: 0.8rem; color: var(--muted); font-weight: 600; }
  .checklist-head .cl-chevron { color: var(--muted); transition: transform .15s; }
  .checklist-card.open .cl-chevron { transform: rotate(180deg); }
  .cl-progress { height: 4px; background: var(--border); }
  .cl-progress > i { display: block; height: 100%; width: 0; background: var(--green); transition: width .2s; }
  .checklist-body { display: none; padding: 2px 14px 14px; }
  .checklist-card.open .checklist-body { display: block; }
  .cl-group { margin-top: 14px; }
  .cl-group h4 { margin: 0 0 4px; font-size: 0.74rem; text-transform: uppercase; letter-spacing: .05em; color: var(--accent2); }
  .cl-item {
    display: flex; align-items: flex-start; gap: 10px; padding: 8px 0;
    border-top: 1px solid var(--border); cursor: pointer; font-size: 0.9rem; line-height: 1.4;
  }
  .cl-group .cl-item:first-of-type { border-top: none; }
  .cl-item input { margin-top: 2px; width: 17px; height: 17px; flex: 0 0 auto; accent-color: var(--green); cursor: pointer; }
  .cl-item.done span { color: var(--muted); text-decoration: line-through; }
  .cl-item a.place { color: var(--accent); font-weight: 600; text-decoration: none; border-bottom: 1px dotted var(--accent); }
  .cl-reset { margin-top: 14px; background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 6px 12px; font-size: 0.78rem; cursor: pointer; }
  .checklist-body ul { margin: 6px 0 2px; padding-left: 20px; }
  .checklist-body li { font-size: 0.88rem; line-height: 1.48; margin: 5px 0; }
  .checklist-body li strong { color: var(--text); }

  /* ---- Detail ---- */
  .detail-hero { display: flex; align-items: center; gap: 14px; margin-bottom: 6px; }
  .detail-hero .dh-icon {
    width: 64px; height: 64px; border-radius: 16px; flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center; font-size: 2.1rem;
  }
  .detail-hero .dh-meta { font-size: 0.74rem; color: var(--muted); font-weight: 700; }
  .detail-hero .dh-date { color: var(--accent2); font-weight: 600; font-size: 0.85rem; }
  .detail-hero .dh-title { font-size: 1.2rem; font-weight: 700; line-height: 1.2; margin-top: 2px; }

  .section { margin-top: 16px; }
  .section h3 {
    font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--accent); margin: 0 0 6px;
  }
  .section p, .section li { font-size: 0.93rem; line-height: 1.5; margin: 4px 0; }
  .section ul { margin: 4px 0 0; padding-left: 20px; }
  .section a.place { color: var(--accent); font-weight: 600; text-decoration: none; border-bottom: 1px dotted var(--accent); }

  .drive {
    display: inline-block; margin: 8px 0 2px;
    background: #1e2a33; border: 1px solid #2f4250; color: #9fd6ff;
    border-radius: 8px; padding: 5px 11px; font-size: 0.84rem; font-weight: 600;
  }
  .leg { font-size: 0.92rem; line-height: 1.45; margin: 6px 0; padding-left: 10px; border-left: 2px solid var(--border); }
  .pill-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .pill {
    display: inline-flex; align-items: center; gap: 5px;
    background: #25303a; color: var(--text); border: 1px solid var(--border);
    border-radius: 10px; padding: 9px 13px; font-size: 0.86rem; text-decoration: none; font-weight: 500;
  }
  .pill.maps { background: #16364a; border-color: #1f4a64; color: #9fd6ff; }
  .pill.waze { background: #1d3a2c; border-color: #2c5a40; color: #a6e8c2; }
  .pill.park { background: #3a3318; border-color: #5a4d20; color: #f4d896; }

  .badge {
    display: inline-block; background: var(--green); color: #0f1418;
    font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 8px;
    margin-left: 6px; vertical-align: middle;
  }
  .badge.warn { background: var(--accent2); }
  .badge.fest { background: #c792ea; }

  .booking-box {
    background: #14202a; border: 1px solid #1f4a64; border-radius: 10px;
    padding: 10px 12px; font-size: 0.86rem; margin-top: 6px;
  }
  .booking-box .conf { color: var(--accent2); font-weight: 600; }
  .note {
    background: #2a2418; border-left: 3px solid var(--accent2);
    padding: 8px 12px; border-radius: 6px; font-size: 0.86rem; margin-top: 6px;
  }
  .expense-box {
    background: #16241c; border: 1px solid #244233; border-radius: 10px;
    padding: 10px 12px; margin-top: 6px; font-size: 0.89rem;
  }
  .expense-box .expense-total { color: var(--green); font-weight: 700; }
  .expense-box ul { margin: 6px 0 0; padding-left: 18px; }
  .expense-box .expense-note { color: var(--muted); font-size: 0.82rem; margin-top: 6px; }

  .prevnext { display: flex; gap: 10px; margin-top: 22px; }
  .prevnext button {
    flex: 1; background: var(--card); border: 1px solid var(--border); color: var(--text);
    border-radius: 12px; padding: 12px; font-size: 0.85rem; cursor: pointer;
  }
  .prevnext button:disabled { opacity: 0.35; cursor: default; }

  .hidden { display: none !important; }
  footer { text-align: center; color: var(--muted); font-size: 0.75rem; padding: 22px 16px; }

  /* ---- Route map ---- */
  .map-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin: 12px 0 4px; }
  .map-head { padding: 12px 14px 8px; font-weight: 700; font-size: 1rem; }
  .map-head .map-sub { display: block; font-weight: 500; font-size: 0.78rem; color: var(--muted); margin-top: 3px; line-height: 1.4; }
  #routeMap { height: 380px; width: 100%; background: var(--bg); }
  .map-legend { padding: 9px 14px; font-size: 0.76rem; color: var(--muted); border-top: 1px solid var(--border); }
  .route-pin { background: none !important; border: none !important; }
  .route-pin .rp {
    position: relative; width: 34px; height: 34px; border-radius: 50%;
    background: var(--card); border: 2px solid var(--accent);
    display: flex; align-items: center; justify-content: center; font-size: 1.05rem;
    box-shadow: 0 1px 5px rgba(0,0,0,.45);
  }
  .route-pin .rp b {
    position: absolute; top: -7px; right: -7px; background: var(--accent); color: #08222f;
    font-size: 0.6rem; line-height: 1; width: 16px; height: 16px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-weight: 800;
  }
  .leaflet-popup-content .map-pop strong { font-size: 0.95rem; }
  .leaflet-popup-content .map-pop .mp-days { color: #1565a0; font-weight: 700; font-size: 0.76rem; margin: 2px 0; }
  .leaflet-popup-content .map-pop .mp-note { color: #333; font-size: 0.85rem; }
  .leaflet-popup-content .map-pop a { display: inline-block; margin-top: 7px; color: #1565a0; font-weight: 700; text-decoration: none; }
</style>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

function mapTileURL() {
  return document.documentElement.getAttribute('data-theme') === 'light'
    ? 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png'
    : 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
}
// Draw the road-accurate driving route (OSRM); fall back to straight dashed lines if offline/unavailable.
function drawDrivingRoute() {
  if (!routeMap) return;
  if (drivingGeom) { L.polyline(drivingGeom, { color: '#5fb4e5', weight: 4, opacity: 0.9 }).addTo(routeMap); return; }
  const fallback = L.polyline(routeLine, { color: '#5fb4e5', weight: 2, opacity: 0.4, dashArray: '7 7' }).addTo(routeMap);
  const url = 'https://router.project-osrm.org/route/v1/driving/' +
    drivingWaypoints.map(c => c.join(',')).join(';') + '?overview=full&geometries=geojson';
  fetch(url).then(r => r.json()).then(d => {
    if (!d.routes || !d.routes[0] || !routeMap) return;
    drivingGeom = d.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
    L.polyline(drivingGeom, { color: '#5fb4e5', weight: 4, opacity: 0.9 }).addTo(routeMap);
    routeMap.removeLayer(fallback);
  }).catch(() => {});
}
function initRouteMap() {
  if (!window.L) return;
  const el = document.getElementById('routeMap');
  if (!el) return;
  if (routeMap) { routeMap.remove(); routeMap = null; }
  routeMap = L.map(el, { scrollWheelZoom: false });
  routeTiles = L.tileLayer(mapTileURL(), {
    attribution: '© OpenStreetMap, © CARTO', subdomains: 'abcd', maxZoom: 18
  }).addTo(routeMap);
  drawDrivingRoute();
  routeStops.forEach(s => {
    const icon = L.divIcon({ className: 'route-pin', html: `<div class="rp">${s.emoji}<b>${s.n}</b></div>`, iconSize: [34, 34], iconAnchor: [17, 17] });
    L.marker([s.lat, s.lng], { icon }).addTo(routeMap).bindPopup(
      `<div class="map-pop"><strong>${s.n}. ${s.name}</strong><div class="mp-days">${s.days}</div>` +
      `<div class="mp-note">${s.note}</div>` +
      `<a href="${placeLink(s.q)}" target="_blank" rel="noopener">🗺️ Open in Google Maps</a></div>`
    );
  });
  routeMap.fitBounds(routeStops.map(s => [s.lat, s.lng]), { padding: [30, 30] });
}

function mapsLink(dest) { return `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(dest)}&travelmode=driving`; }
function wazeLink(dest) { return `https://waze.com/ul?q=${encodeURIComponent(dest)}&navigate=yes`; }
function placeLink(query) { return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`; }
function park4nightLink(lat, lng) { return `https://park4night.com/en/search?lat=${lat}&lng=${lng}&zoom=11`; }

function placeList(items) {
  let h = '<ul>';
  items.forEach(s => {
    const name = s.loc ? `<a class="place" href="${placeLink(s.loc)}" target="_blank" rel="noopener">${s.name}</a>` : `<strong>${s.name}</strong>`;
    h += `<li>${name} — ${s.note}</li>`;
  });
  return h + '</ul>';
}

function dayShortLabel(d) {
  const day = d.match(/Day \d+/);
  const dm = d.match(/\w+, (\w+ \d+)/);
  return { tag: day ? day[0].toUpperCase() : "", date: dm ? dm[1] : d };
}

const CL_KEY = 'trip-checklist';
const CL_OPEN_KEY = 'trip-checklist-open';
const clTotal = checklist.reduce((n, g) => n + g.items.length, 0);
function clState() { try { return JSON.parse(localStorage.getItem(CL_KEY)) || {}; } catch (e) { return {}; } }
function clSave(s) { localStorage.setItem(CL_KEY, JSON.stringify(s)); }

function checklistHTML() {
  const state = clState();
  const done = Object.values(state).filter(Boolean).length;
  const pct = clTotal ? Math.round(done / clTotal * 100) : 0;
  const open = localStorage.getItem(CL_OPEN_KEY) === '1';
  let body = '';
  checklist.forEach((g, gi) => {
    body += `<div class="cl-group"><h4>${g.group}</h4>`;
    g.items.forEach((it, ii) => {
      const id = `${gi}-${ii}`;
      const checked = !!state[id];
      body += `<label class="cl-item ${checked ? 'done' : ''}">
        <input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleClItem('${id}', this)">
        <span>${it}</span></label>`;
    });
    body += `</div>`;
  });
  body += `<button class="cl-reset" onclick="resetChecklist()">Reset checklist</button>`;
  return `<div class="checklist-card ${open ? 'open' : ''}" id="checklistCard">
    <button class="checklist-head" onclick="toggleChecklist()">
      <span class="cl-emoji">🧳</span>
      <span class="cl-title">Before you fly — checklist</span>
      <span class="cl-count" id="clCount">${done}/${clTotal}</span>
      <span class="cl-chevron">▾</span>
    </button>
    <div class="cl-progress"><i id="clBar" style="width:${pct}%"></i></div>
    <div class="checklist-body">${body}</div>
  </div>`;
}

function toggleChecklist() {
  const card = document.getElementById('checklistCard');
  const open = card.classList.toggle('open');
  localStorage.setItem(CL_OPEN_KEY, open ? '1' : '0');
}
function toggleClItem(id, el) {
  const s = clState();
  if (el.checked) s[id] = true; else delete s[id];
  clSave(s);
  const done = Object.values(s).filter(Boolean).length;
  document.getElementById('clCount').textContent = `${done}/${clTotal}`;
  document.getElementById('clBar').style.width = (clTotal ? Math.round(done / clTotal * 100) : 0) + '%';
  el.closest('.cl-item').classList.toggle('done', el.checked);
}
function resetChecklist() {
  if (!confirm('Clear all checklist ticks?')) return;
  localStorage.removeItem(CL_KEY);
  localStorage.setItem(CL_OPEN_KEY, '1');
  renderHome();
}

// ---------- Campervan pickup & pre-drive checks ----------

    "⚠️ <strong>Photograph & video the whole van</strong> before signing — every existing scratch, dent & the interior. Your protection against the €150 deductible.",
    "⚠️ <strong>Confirm exact size:</strong> length (~5.99 m), height & width — write them on a sticky note for the dash (low bridges, barriers, ferry decks, parking).",
    "⚠️ <strong>Get the contract permissions in writing:</strong> crossing into <strong>Sweden</strong>, off-grid / festival parking, and whether driving on Rømø's beach is allowed (most rentals forbid sand/off-road).",
    "<strong>Fresh-water tank capacity (litres)</strong> + how to fill — this decides the Borderland water plan. Confirm grey-water & toilet cassette: where they are and how to empty.",
    "<strong>Gas:</strong> locate LPG bottle(s), check level, learn the shut-off valve & how to swap a bottle.",
    "<strong>Leisure (habitation) battery:</strong> current charge, how it recharges (driving / hookup / solar), and how to read the level — critical for off-grid festival nights.",
    "<strong>Electrics:</strong> CEE hook-up cable + adapters, where the sockets / inverter are, and the fridge's 12V / 230V / gas modes.",
    "<strong>Heating & hot water:</strong> how to switch on, gas vs electric.",
    "<strong>Driving basics:</strong> fuel type & required return level, AdBlue, dashboard warning lights, and where the registration, insurance green card & <strong>breakdown number</strong> live (save it in your phone).",
    "<strong>Safety kit present:</strong> warning triangle(s), hi-vis vests (one per person — legally required), fire extinguisher, first-aid kit, smoke/CO/gas alarms, spare wheel or repair kit + jack.",
    "<strong>Tyres:</strong> condition + correct pressures when loaded; note where the toolkit is.",
    "<strong>Show me how it works:</strong> habitation door lock, awning, step, roof vents/skylights, blinds, and the bed conversion. Get all key sets.",
    "Do a short <strong>test drive</strong> in the yard before you leave — mirrors, biting point, reversing camera, tail-swing."
  ]},
  { group: "Before EVERY drive — 60-second pre-roll", items: [
    "<strong>Gas OFF</strong> at the bottle.",
    "Roof vents/skylights & windows shut, blinds up, <strong>nothing loose on counters</strong>, fridge switched to 12V.",
    "Step retracted, <strong>awning in</strong>, external lockers + habitation door locked.",
    "Electric hook-up unplugged & cable stowed; fresh/waste caps closed.",
    "Walk a full circle round the van — obstacles, low branches, the height vs any barrier (especially tight pitches).",
    "Tanks check: grey/black not overfull, enough fresh water for the leg, fuel + AdBlue OK.",
    "Mirrors set, everyone belted, mind the <strong>overhang & tail-swing</strong> on turns.",
    "Glance at tyres; no warning lights. Never drive same-day after wine — Sweden's limit is ~0.2‰ (one glass)."
  ]}
];
function vanChecksHTML() {
  const open = localStorage.getItem('trip-van-open') === '1';
  let body = '';
  vanChecks.forEach(g => {
    body += `<div class="cl-group"><h4>${g.group}</h4><ul>`;
    g.items.forEach(it => { body += `<li>${it}</li>`; });
    body += `</ul></div>`;
  });
  return `<div class="checklist-card ${open ? 'open' : ''}" id="vanCard">
    <button class="checklist-head" onclick="toggleVanCard()">
      <span class="cl-emoji">🚐</span>
      <span class="cl-title">Campervan — pickup &amp; pre-drive checks</span>
      <span class="cl-chevron">▾</span>
    </button>
    <div class="checklist-body">${body}</div>
  </div>`;
}
function toggleVanCard() {
  const card = document.getElementById('vanCard');
  const open = card.classList.toggle('open');
  localStorage.setItem('trip-van-open', open ? '1' : '0');
}

function renderHome() {
  const regions = ["ALL", "DE", "DK", "SE"];
  let chips = `<div class="chips">`;
  regions.forEach(r => {
    const label = r === "ALL" ? "All days" : `${COUNTRY_META[r].flag} ${COUNTRY_META[r].name}`;
    chips += `<button class="chip ${activeRegion === r ? 'active' : ''}" onclick="setRegion('${r}')">${label}</button>`;
  });
  chips += `</div>`;

  let cards = `<div class="grid">`;
  days.forEach((d, i) => {
    if (activeRegion !== "ALL" && COUNTRY[i] !== activeRegion) return;
    const cm = COUNTRY_META[COUNTRY[i]];
    const sl = dayShortLabel(d.date);
    cards += `
      <button class="daycard" onclick="openDay(${i})">
        <div class="daycard-icon" style="background:${cm.color}22;border:1px solid ${cm.color}55">${ICONS[i]}</div>
        <div class="daycard-meta">${sl.tag} · ${cm.flag}</div>
        <div class="daycard-date">${sl.date}</div>
        <div class="daycard-title">${d.title}</div>
        <div class="daycard-drive">🕒 ${d.drive}</div>
      </button>`;
  });
  cards += `</div>`;

  home.innerHTML = `
    <div class="hero">
      <h1>🚐 Denmark & Sweden Trip</h1>
      <p>Jul 12–30, 2026 · A 19-day campervan loop: Hamburg → Denmark → Copenhagen → Borderland (Sweden) → back to Berlin.</p>
    </div>
    <div class="summary">
      <div class="stat">Duration<b>19 days</b></div>
      <div class="stat">Campervan<b>17 days</b></div>
      <div class="stat">On-road spend<b>~€2,300–2,600</b></div>
    </div>
    <div class="map-card">
      <div class="map-head">🗺️ Route overview
        <span class="map-sub">The loop: Hamburg → Ribe → Rømø → Roskilde → Copenhagen → Borderland (SE) → Åsnen → Kullaberg → ferry home via Berlin. Tap a pin for details + a Google Maps link.</span>
      </div>
      <div id="routeMap"></div>
      <div class="map-legend">Numbered ① → ⑩ in travel order · dashed line traces the drive</div>
    </div>
    ${checklistHTML()}
    ${vanChecksHTML()}
    ${chips}
    ${cards}
  `;
  initRouteMap();
}

function setRegion(r) { activeRegion = r; renderHome(); window.scrollTo(0, 0); }

// ---------- DETAIL ----------
function dayDetailHTML(day, i) {
  const cm = COUNTRY_META[COUNTRY[i]];
  const sl = dayShortLabel(day.date);
  let html = `
    <div class="detail-hero">
      <div class="dh-icon" style="background:${cm.color}22;border:1px solid ${cm.color}55">${ICONS[i]}</div>
      <div>
        <div class="dh-meta">${sl.tag} · ${cm.flag} ${cm.name}</div>
        <div class="dh-date">${sl.date}</div>
        <div class="dh-title">${day.title}</div>
      </div>
    </div>
  `;

  if (day.route) {
    html += `<div class="section"><h3>Route</h3><p>${day.route.label}</p>`;
    if (day.drive) html += `<div class="drive">🕒 Driving: ${day.drive}</div>`;
    if (day.route.dest) {
      html += `<div class="pill-row">
        <a class="pill maps" href="${mapsLink(day.route.dest)}" target="_blank" rel="noopener">🗺️ Google Maps</a>
        <a class="pill waze" href="${wazeLink(day.route.dest)}" target="_blank" rel="noopener">🚗 Waze</a>
      </div>`;
    }
    html += `</div>`;
  }

  if (day.legs && day.legs.length) {
    html += `<div class="section"><h3>Schedule</h3>`;
    day.legs.forEach(l => { html += `<div class="leg">${l}</div>`; });
    html += `</div>`;
  }

  if (day.booking && day.booking.length) {
    html += `<div class="section"><h3>Bookings</h3>`;
    day.booking.forEach(b => {
      html += `<div class="booking-box"><strong>${b.type}:</strong> ${b.text}`;
      if (b.conf) html += ` <span class="conf">· ${b.conf}</span>`;
      html += `</div>`;
    });
    html += `</div>`;
  }

  if (day.sleep) {
    const s = day.sleep.status || '';
    const badge = s.startsWith('confirmed') ? `<span class="badge">confirmed</span>`
      : s === 'festival' ? `<span class="badge fest">festival</span>`
      : s === 'planned' ? `<span class="badge warn">to book</span>`
      : s === 'flexible' ? `<span class="badge warn">flexible</span>`
      : `<span class="badge warn">unconfirmed</span>`;
    html += `<div class="section"><h3>Sleep ${badge}</h3><p>${day.sleep.text}</p>`;
    if (day.sleep.coord) {
      html += `<div class="pill-row">
        <a class="pill park" href="${park4nightLink(day.sleep.coord.lat, day.sleep.coord.lng)}" target="_blank" rel="noopener">🅿️ Park4Night</a>
      </div>`;
    }
    html += `</div>`;
  }

  if (day.survival && day.survival.length) html += `<div class="section"><h3>🔥 Borderland Survival</h3>${placeList(day.survival)}</div>`;
  if (day.eat && day.eat.length) html += `<div class="section"><h3>🍽️ Eat</h3>${placeList(day.eat)}</div>`;
  if (day.coffee && day.coffee.length) html += `<div class="section"><h3>☕ Coffee</h3>${placeList(day.coffee)}</div>`;
  if (day.services && day.services.length) html += `<div class="section"><h3>🚿 Camper Services · water / dump</h3>${placeList(day.services)}</div>`;
  if (day.shops && day.shops.length) html += `<div class="section"><h3>🛒 Stock Up · supermarkets</h3>${placeList(day.shops)}</div>`;
  if (day.attractions && day.attractions.length) html += `<div class="section"><h3>🎡 Attractions & Sights</h3>${placeList(day.attractions)}</div>`;
  if (day.spa && day.spa.length) html += `<div class="section"><h3>🧖 Spa & Wellness</h3>${placeList(day.spa)}</div>`;

  if (day.activities && day.activities.length) {
    html += `<div class="section"><h3>🥾 Hikes, Tours & Wildlife</h3><ul>`;
    day.activities.forEach(act => { html += `<li><strong>${act.name}</strong> — ${act.note}</li>`; });
    html += `</ul></div>`;
  }

  if (day.reads && day.reads.length) {
    html += `<div class="section"><h3>📚 Blogs & Videos</h3><ul>`;
    day.reads.forEach(r => { html += `<li><a class="place" href="${r.url}" target="_blank" rel="noopener">${r.name}</a> — ${r.note}</li>`; });
    html += `</ul></div>`;
  }

  const exp = dayExpenses[i];
  if (exp) {
    html += `<div class="section"><h3>💶 Est. Expenses · <span class="expense-total">${exp.total}</span></h3>`;
    html += `<div class="expense-box"><ul>`;
    exp.items.forEach(it => { html += `<li>${it}</li>`; });
    html += `</ul>`;
    if (exp.note) html += `<div class="expense-note">${exp.note}</div>`;
    html += `</div></div>`;
  }

  if (day.notes && day.notes.length) {
    html += `<div class="section"><h3>📌 Remember</h3>`;
    day.notes.forEach(n => { html += `<div class="note">${n}</div>`; });
    html += `</div>`;
  }

  html += `<div class="prevnext">
    <button onclick="openDay(${i - 1})" ${i === 0 ? 'disabled' : ''}>← ${i === 0 ? '' : 'Day ' + i}</button>
    <button onclick="openDay(${i + 1})" ${i === days.length - 1 ? 'disabled' : ''}>${i === days.length - 1 ? '' : 'Day ' + (i + 2)} →</button>
  </div>`;

  return html;
}

function openDay(i) {
  if (i < 0 || i >= days.length) return;
  detail.innerHTML = dayDetailHTML(days[i], i);
  home.classList.add('hidden');
  detail.classList.remove('hidden');
  document.getElementById('backBtn').classList.remove('hidden');
  const sl = dayShortLabel(days[i].date);
  document.getElementById('barTitle').textContent = `${sl.tag} · ${sl.date}`;
  window.scrollTo(0, 0);
}

function showHome() {
  detail.classList.add('hidden');
  home.classList.remove('hidden');
  document.getElementById('backBtn').classList.add('hidden');
  document.getElementById('barTitle').textContent = "🚐 Denmark & Sweden Trip";
  window.scrollTo(0, 0);
}

// ---------- Theme ----------
const rootEl = document.documentElement;
const themeBtn = document.getElementById('themeBtn');
if (localStorage.getItem('trip-theme') === 'light') rootEl.setAttribute('data-theme', 'light');
function syncThemeBtn() { themeBtn.textContent = rootEl.getAttribute('data-theme') === 'light' ? '☀️' : '🌙'; }
function toggleTheme() {
  const goLight = rootEl.getAttribute('data-theme') !== 'light';
  if (goLight) rootEl.setAttribute('data-theme', 'light'); else rootEl.removeAttribute('data-theme');
  localStorage.setItem('trip-theme', goLight ? 'light' : 'dark');
  syncThemeBtn();
  if (routeTiles) routeTiles.setUrl(mapTileURL());
}
syncThemeBtn();

renderHome();
</script>

</body>
</html>
