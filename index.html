  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;

    color:#e8edf1; border-radius:10px; padding:12px; font-size:1rem; margin-bottom:10px; }
  button { width:100%; background:#5fb4e5; border:none; color:#08222f; font-weight:700; border-radius:10px;
    padding:12px; font-size:1rem; cursor:pointer; }
  button:disabled { opacity:.5; cursor:default; }
  label { display:flex; gap:7px; align-items:center; justify-content:center; color:#8fa1ad;
    font-size:.8rem; margin:12px 0 0; }

  } catch (e) {
    localStorage.removeItem(KEY);
    go.disabled = false;
    err.textContent = "Wrong password — try again.";
  }
}
document.getElementById("f").addEventListener("submit", e => {
  e.preventDefault();
  unlock(document.getElementById("pw").value, document.getElementById("save").checked);
});
const saved = localStorage.getItem(KEY);
if (saved) unlock(saved, true);
if ("serviceWorker" in navigator && location.protocol === "https:")
  navigator.serviceWorker.register("./sw.js");
</script>
